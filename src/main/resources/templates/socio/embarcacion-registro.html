<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registrar Embarcación — Club Náutico Neptuno</title>
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <!-- Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --primary: #0284c7;
            --primary-dark: #0369a1;
            --secondary: #0f172a;
            --accent: #22d3ee;
            --bg-main: #f8fafc;
            --text-main: #1e293b;
            --text-muted: #64748b;
            --border: #e2e8f0;
            --radius: 16px;
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: var(--bg-main);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            background-image: 
                radial-gradient(at 0% 0%, rgba(2, 132, 199, 0.05) 0px, transparent 50%),
                radial-gradient(at 100% 100%, rgba(34, 211, 238, 0.05) 0px, transparent 50%);
        }

        .container {
            width: 100%;
            max-width: 520px;
            background: white;
            padding: 48px;
            border-radius: 24px;
            border: 1px solid var(--border);
            box-shadow: 0 20px 40px rgba(15, 23, 42, 0.05);
            position: relative;
            overflow: hidden;
        }

        .container::before {
            content: '';
            position: absolute;
            top: 0; left: 0; width: 100%; height: 6px;
            background: linear-gradient(90deg, var(--primary), var(--accent));
        }

        .header { text-align: center; margin-bottom: 40px; }
        
        .header-icon {
            width: 64px; height: 64px;
            background: rgba(2, 132, 199, 0.1);
            color: var(--primary);
            border-radius: 20px;
            display: flex; align-items: center; justify-content: center;
            font-size: 28px;
            margin: 0 auto 20px;
        }

        .header h1 { font-size: 24px; font-weight: 800; color: var(--secondary); letter-spacing: -0.5px; margin-bottom: 8px; }
        .header p { color: var(--text-muted); font-size: 14px; }

        .form-group { margin-bottom: 24px; }
        
        .form-group label {
            display: block;
            font-size: 13px;
            font-weight: 700;
            color: var(--secondary);
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .form-control {
            width: 100%;
            padding: 14px 18px;
            border: 2px solid var(--border);
            border-radius: 14px;
            font-size: 15px;
            font-family: inherit;
            color: var(--secondary);
            outline: none;
            transition: var(--transition);
            background: #fcfdfe;
        }

        .form-control:focus {
            border-color: var(--primary);
            background: white;
            box-shadow: 0 0 0 4px rgba(2, 132, 199, 0.1);
        }

        .form-control::placeholder { color: #cbd5e1; }

        .btn-submit {
            width: 100%;
            background: linear-gradient(135deg, var(--secondary) 0%, #1e293b 100%);
            color: white;
            padding: 16px;
            border: none;
            border-radius: 14px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: var(--transition);
            box-shadow: 0 10px 20px rgba(15, 23, 42, 0.15);
            margin-top: 8px;
        }

        .btn-submit:hover {
            transform: translateY(-2px);
            box-shadow: 0 15px 30px rgba(15, 23, 42, 0.25);
            background: linear-gradient(135deg, #1e293b 0%, #334155 100%);
        }

        .btn-submit:active { transform: translateY(0); }

        .btn-back {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            margin-top: 24px;
            color: var(--text-muted);
            text-decoration: none;
            font-size: 14px;
            font-weight: 600;
            transition: color 0.2s;
        }

        .btn-back:hover { color: var(--primary); }

        .alert-error {
            padding: 16px;
            background: #fef2f2;
            color: #b91c1c;
            border-radius: 12px;
            margin-bottom: 24px;
            font-size: 14px;
            border: 1px solid #fee2e2;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        /* --- Modal Styles --- */
        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(15, 23, 42, 0.6);
            backdrop-filter: blur(4px);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            padding: 20px;
        }

        .modal {
            background: white;
            width: 100%;
            max-width: 400px;
            padding: 32px;
            border-radius: 20px;
            text-align: center;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
            transform: scale(0.95);
            opacity: 0;
            transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .modal.active { transform: scale(1); opacity: 1; }

        .modal-icon {
            font-size: 48px;
            color: var(--primary);
            margin-bottom: 20px;
        }

        .modal-title { font-size: 20px; font-weight: 800; margin-bottom: 12px; color: var(--secondary); }
        .modal-text { font-size: 14px; color: var(--text-muted); margin-bottom: 24px; line-height: 1.6; }

        .modal-actions { display: flex; gap: 12px; }
        
        .m-btn {
            flex: 1;
            padding: 12px;
            border-radius: 12px;
            font-weight: 700;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.2s;
            border: none;
        }

        .m-btn-confirm { background: var(--primary); color: white; }
        .m-btn-cancel { background: #f1f5f9; color: var(--text-muted); }
        .m-btn:hover { opacity: 0.9; }

    </style>
</head>
<body>

    <div class="container">
        <div class="header">
            <div class="header-icon">
                <i class="fas fa-ship"></i>
            </div>
            <h1>Nueva Embarcación</h1>
            <p>Registra los datos para la autorización de muelle</p>
        </div>

        <div th:if="${error}" class="alert-error">
            <i class="fas fa-circle-exclamation"></i>
            <span th:text="${error}">Error</span>
        </div>

        <form id="boatForm" th:action="@{/socio/registrar-embarcacion}" method="post">
            <div class="form-group">
                <label for="nombre">Nombre de la Nave</label>
                <input type="text" name="nombre" id="nombre" class="form-control" placeholder="Ej: Poseidón II" required>
            </div>
            
            <div class="form-group">
                <label for="tipo">Tipo de Embarcación</label>
                <select name="tipo" id="tipo" class="form-control" required>
                    <option value="" disabled selected>Seleccione el tipo...</option>
                    <option value="Velero">Velero de Competición</option>
                    <option value="Yate">Yate de Lujo</option>
                    <option value="Lancha">Lancha de Recreo</option>
                    <option value="Motoski">Moto Acuática</option>
                    <option value="Catamaran">Catamarán</option>
                </select>
            </div>

            <div class="form-group">
                <label for="matricula">Matrícula Oficial</label>
                <input type="text" name="matricula" id="matricula" class="form-control" placeholder="MAT-0000-PE" required>
            </div>

            <div class="form-group">
                <label for="descripcion">Detalles Adicionales</label>
                <textarea name="descripcion" id="descripcion" class="form-control" rows="3" placeholder="Indique características especiales (opcional)..."></textarea>
            </div>

            <button type="submit" class="btn-submit">
                <i class="fas fa-save" style="margin-right: 8px;"></i>
                Guardar Registro
            </button>
            
            <a href="/socio/dashboard" class="btn-back">
                <i class="fas fa-arrow-left"></i>
                Volver al Panel
            </a>
        </form>
    </div>

    <!-- Confirm Modal -->
    <div id="confirmModal" class="modal-overlay">
        <div class="modal">
            <div class="modal-icon"><i class="fas fa-circle-question"></i></div>
            <h3 class="modal-title">¿Confirmar Registro?</h3>
            <p class="modal-text">Se procederá a registrar la embarcación <strong id="modalBoatName"></strong> bajo su cuenta de socio.</p>
            <div class="modal-actions">
                <button type="button" class="m-btn m-btn-cancel" onclick="closeModal()">Cancelar</button>
                <button type="button" class="m-btn m-btn-confirm" onclick="submitForm()">Sí, registrar</button>
            </div>
        </div>
    </div>

    <script>
        const form = document.getElementById('boatForm');
        const modal = document.getElementById('confirmModal');
        const boatNameSpan = document.getElementById('modalBoatName');

        form.addEventListener('submit', function(e) {
            e.preventDefault();
            boatNameSpan.innerText = document.getElementById('nombre').value;
            modal.style.display = 'flex';
            setTimeout(() => modal.querySelector('.modal').classList.add('active'), 10);
        });

        function closeModal() {
            modal.querySelector('.modal').classList.remove('active');
            setTimeout(() => modal.style.display = 'none', 300);
        }

        function submitForm() {
            form.submit();
        }

        // Close on escape
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') closeModal();
        });
    </script>

</body>
</html>
