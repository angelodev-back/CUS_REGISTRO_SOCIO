<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recuperar Contraseña — Club Náutico Neptuno</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined&display=swap" rel="stylesheet"/>
    <link rel="stylesheet" th:href="@{/css/neptuno.css}">
    <style>
        .split-wrapper { display: flex; align-items: center; justify-content: center; min-height: 100vh; background: var(--bg); padding: 20px; }
        .alert-error { background: #fee2e2; color: #991b1b; padding: 12px; border-radius: 6px; margin-bottom: 16px; font-size: 13px; display: flex; align-items: center; gap: 8px; border: 1px solid #ef4444; }
    </style>
</head>
<body>
<div class="split-wrapper">
    <div class="welcome-card" style="width: 100%; max-width: 420px; background: white; padding: 40px; border-radius: 16px; border: 1px solid var(--border); box-shadow: var(--shadow-lg);">
        <a th:href="@{/login}" style="background:none; border:none; color:#5a6a80; cursor:pointer; display:flex; align-items:center; gap:6px; margin-bottom:20px; padding:0; font-size:14px; font-weight:500; text-decoration:none;">
            <svg viewBox="0 0 24 24" style="width:18px; height:18px;"><polyline points="15 18 9 12 15 6" fill="none" stroke="currentColor" stroke-width="2"/></svg>
            Volver
        </a>
        <h2 style="font-size: 24px; color: var(--navy); margin-bottom: 10px;">Recuperar acceso</h2>
        <p class="desc" style="font-size: 14px; color: var(--muted); margin-bottom: 24px; line-height: 1.5;">
            Valida tu identidad con documento, correo y fecha registrada para crear una nueva contraseña segura.
        </p>

        <div th:if="${error}" class="alert alert-error">
            <span th:text="${error}"></span>
        </div>

        <div id="client-error" class="alert alert-error" style="display:none;"></div>
        
        <form th:action="@{/recuperar-password}" method="post" id="recoveryForm">
            <div class="mb-3">
                <label for="numDocumento" class="form-label fw-bold small text-secondary">N° de Documento</label>
                <input type="text" id="numDocumento" name="numDocumento" class="form-control fi" placeholder="Ej. 12345678" required maxlength="11" minlength="8" inputmode="numeric" pattern="[0-9]{8,11}" />
            </div>

            <div class="mb-3">
                <label for="correo" class="form-label fw-bold small text-secondary">Correo electrónico registrado</label>
                <input type="email" id="correo" name="correo" class="form-control fi" placeholder="nombre@correo.com" required maxlength="100" />
            </div>

            <div class="mb-3">
                <label for="fechaNacimiento" class="form-label fw-bold small text-secondary">Fecha de nacimiento / constitución</label>
                <input type="date" id="fechaNacimiento" name="fechaNacimiento" class="form-control fi" required />
            </div>
            
            <div class="mb-4">
                <label for="nuevaPassword" class="form-label fw-bold small text-secondary">Nueva Contraseña</label>
                <div class="position-relative">
                    <input type="password" id="nuevaPassword" name="nuevaPassword" class="form-control fi" placeholder="********" required style="padding-right: 48px;" minlength="8" maxlength="72"/>
                    <button type="button" onclick="togglePassword()" class="position-absolute end-0 top-50 translate-middle-y border-0 bg-transparent text-secondary p-0 me-3 d-flex align-items-center justify-content-center" style="cursor: pointer;">
                        <span id="eye-icon" class="material-symbols-outlined" style="font-size: 20px;">visibility</span>
                    </button>
                </div>
                <small style="color:#64748b; font-size:12px;">Debe incluir mayúscula, minúscula, número y símbolo.</small>
            </div>

            <div class="mb-4">
                <label for="confirmarPassword" class="form-label fw-bold small text-secondary">Confirmar Contraseña</label>
                <input type="password" id="confirmarPassword" name="confirmarPassword" class="form-control fi" placeholder="********" required minlength="8" maxlength="72"/>
            </div>
            
            <button type="submit" class="btn-submit w-100 justify-content-center" style="border:none; padding:14px;">
                Restablecer contraseña
            </button>
        </form>
    </div>
</div>

<script>
    function togglePassword() {
        const passwordInput = document.getElementById('nuevaPassword');
        const eyeIcon = document.getElementById('eye-icon');
        if (passwordInput.type === 'password') {
            passwordInput.type = 'text';
            eyeIcon.innerText = 'visibility_off';
        } else {
            passwordInput.type = 'password';
            eyeIcon.innerText = 'visibility';
        }
    }

    document.getElementById('recoveryForm').addEventListener('submit', function(e) {
        const doc = document.getElementById('numDocumento').value.trim();
        const correo = document.getElementById('correo').value.trim();
        const fecha = document.getElementById('fechaNacimiento').value;
        const pass = document.getElementById('nuevaPassword').value;
        const confirm = document.getElementById('confirmarPassword').value;
        const errorBox = document.getElementById('client-error');

        const showError = (msg) => {
            errorBox.innerText = msg;
            errorBox.style.display = 'block';
            e.preventDefault();
        };

        errorBox.style.display = 'none';

        if (!/^\d{8}$|^\d{11}$/.test(doc)) {
            showError('Ingresa un documento válido: DNI (8 dígitos) o RUC (11 dígitos).');
            return;
        }

        const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
        if (!emailRegex.test(correo) || correo.length > 100) {
            showError('Ingresa un correo válido.');
            return;
        }

        if (!fecha) {
            showError('Ingresa la fecha de nacimiento o constitución registrada.');
            return;
        }

        const passwordStrongRegex = /^(?=.*[a-z])(?=.*[A-Z])(?=.*\d)(?=.*[^A-Za-z\d\s]).{8,72}$/;
        if (!passwordStrongRegex.test(pass)) {
            showError('La contraseña debe tener entre 8 y 72 caracteres, con mayúscula, minúscula, número y símbolo.');
            return;
        }

        if (pass !== confirm) {
            showError('La nueva contraseña y su confirmación no coinciden.');
        }
    });
</script>
</body>
</html>
