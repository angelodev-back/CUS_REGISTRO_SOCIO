<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Consultar Estado Socio | Club Neptuno</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { margin: 0; font-family: 'Plus Jakarta Sans', sans-serif; color: #0f172a; background: linear-gradient(135deg, #e0f2fe, #f8fafc 55%, #dbeafe); min-height: 100vh; }
        .wrap { max-width: 760px; margin: 40px auto; padding: 0 16px; }
        .card { background: rgba(255,255,255,.92); backdrop-filter: blur(6px); border: 1px solid #e2e8f0; border-radius: 20px; padding: 28px; box-shadow: 0 16px 40px rgba(15,23,42,.08); }
        h1 { margin: 0 0 8px; font-size: 28px; }
        p { color: #475569; margin: 0 0 20px; }
        .row { display: flex; gap: 10px; flex-wrap: wrap; }
        input { flex: 1; min-width: 240px; border: 1px solid #cbd5e1; border-radius: 12px; padding: 12px 14px; font-size: 15px; }
        button { border: 0; border-radius: 12px; padding: 12px 16px; font-weight: 700; background: #0ea5e9; color: #fff; cursor: pointer; }
        button:hover { background: #0284c7; }
        .result { margin-top: 20px; border: 1px solid #e2e8f0; border-radius: 14px; padding: 18px; display: none; background: #fff; }
        .label { color: #64748b; font-size: 12px; text-transform: uppercase; letter-spacing: .08em; margin-top: 8px; }
        .value { font-weight: 700; }
        .message { margin-top: 12px; padding: 10px 12px; border-radius: 10px; background: #f0f9ff; color: #075985; }
        .error { margin-top: 14px; color: #b91c1c; display: none; }
    </style>
</head>
<body>
<div class="wrap">
    <div class="card">
        <h1>Consulta Pública de Estado</h1>
        <p>Ingresa tu DNI o RUC para conocer el estado de tu solicitud o cuenta.</p>

        <div class="row">
            <input type="text" id="docInput" placeholder="Ejemplo: 12345678 o 20123456789" maxlength="11">
            <button onclick="consultarEstado()">Consultar</button>
        </div>

        <div id="error" class="error"></div>

        <div id="resultado" class="result">
            <div class="label">Nombre</div>
            <div id="rNombre" class="value">-</div>
            <div class="label">Documento</div>
            <div id="rDocumento" class="value">-</div>
            <div class="label">Correo</div>
            <div id="rCorreo" class="value">-</div>
            <div class="label">Estado</div>
            <div id="rEstado" class="value">-</div>
            <div class="label">Acceso al sistema</div>
            <div id="rAcceso" class="value">-</div>
            <div id="rMensaje" class="message"></div>
        </div>
    </div>
</div>

<script>
    async function consultarEstado() {
        const docInput = document.getElementById('docInput');
        const error = document.getElementById('error');
        const resultado = document.getElementById('resultado');

        const documento = docInput.value.trim();
        if (!documento) {
            error.style.display = 'block';
            error.textContent = 'Debes ingresar un número de documento.';
            resultado.style.display = 'none';
            return;
        }

        error.style.display = 'none';

        try {
            const res = await fetch(`/api/socios/consultar-publico/${documento}`);
            const data = await res.json();

            if (!res.ok) {
                error.style.display = 'block';
                error.textContent = data.error || 'No se encontró información para el documento ingresado.';
                resultado.style.display = 'none';
                return;
            }

            document.getElementById('rNombre').textContent = data.nombre || '-';
            document.getElementById('rDocumento').textContent = data.numeroDocumento || '-';
            document.getElementById('rCorreo').textContent = data.email || '-';
            document.getElementById('rEstado').textContent = (data.estado || '-').toUpperCase();
            document.getElementById('rAcceso').textContent = data.tieneAcceso ? 'SI' : 'NO';
            document.getElementById('rMensaje').textContent = data.mensajeEstado || '';
            resultado.style.display = 'block';
        } catch (e) {
            error.style.display = 'block';
            error.textContent = 'No se pudo consultar en este momento. Intenta nuevamente.';
            resultado.style.display = 'none';
        }
    }
</script>
</body>
</html>
