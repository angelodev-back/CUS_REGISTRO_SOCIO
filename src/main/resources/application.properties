spring.application.name=neptuno
server.port=8081

spring.datasource.url=jdbc:mysql://localhost:3306/Neptuno?useSSL=false&serverTimezone=America/Lima
spring.datasource.username=root
spring.datasource.password=123456
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Forzar la actualizacion del schema en lugar de solo validarlo
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
# Agregar la opcion para que ignore diferencias previas
spring.jpa.properties.hibernate.hbm2ddl.auto=update
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

logging.level.root=INFO
logging.level.com.idat.pe=DEBUG

# JWT Configuration
jwt.secret=NeptunoClusSeguroSecretKeyParaJWTPorFavor2024ConMaximaSeguridad
jwt.expiration=36000000
